name: Deploy web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm test

      - run: npx expo export --platform web
        env:
          EXPO_BASE_URL: /flyer-to-table
          # Public Supabase config — wires the deployed site to the real
          # RemoteFlyerExtractor. The anon key is a public key (safe to expose).
          EXPO_PUBLIC_SUPABASE_URL: https://dnkzhrladfjuyvwnhxrb.supabase.co
          EXPO_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRua3pocmxhZGZqdXl2d25oeHJiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ4MzYzNjQsImV4cCI6MjEwMDQxMjM2NH0.KrDkdwa2Heo4v8-G4mewJOlaaCm1-2IyLfPal3Y4DCk

      # Single-page app: serve index.html for any deep link (e.g. /home)
      - run: cp dist/index.html dist/404.html

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
